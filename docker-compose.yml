services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autowash
      POSTGRES_PASSWORD: autowash
      POSTGRES_DB: autowash
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U autowash -d autowash']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://autowash:autowash@db:5432/autowash
      SECRET_KEY: ${SECRET_KEY:-dev-change-me-use-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
